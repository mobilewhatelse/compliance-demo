/* ─── SHARED HELPERS ───────────────────────────────────────────── */

function StatusBadge({ status }) {
  const map = {
    complete:   { cls:'bg-emerald-100 text-emerald-800', label:'Vollständig' },
    incomplete: { cls:'bg-amber-100 text-amber-800',     label:'Unvollständig' },
    missing:    { cls:'bg-red-100 text-red-800',         label:'Fehlend' },
    pass:       { cls:'bg-emerald-100 text-emerald-800', label:'OK' },
    fail:       { cls:'bg-red-100 text-red-800',         label:'Fehler' },
    warn:       { cls:'bg-amber-100 text-amber-800',     label:'Warnung' },
    'auto-merged':   { cls:'bg-emerald-100 text-emerald-800', label:'Auto-Merged' },
    'pending review':{ cls:'bg-amber-100 text-amber-800',     label:'Prüfung' },
    ready:      { cls:'bg-emerald-100 text-emerald-800', label:'Bereit' },
    partial:    { cls:'bg-amber-100 text-amber-800',     label:'Teilweise' },
    pending:    { cls:'bg-slate-100 text-slate-600',     label:'Ausstehend' },
  };
  const { cls, label } = map[status] || { cls:'bg-gray-100 text-gray-700', label: status };
  return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${cls}`}>{label}</span>;
}

function QualityBar({ score }) {
  const color = score >= 80 ? '#10b981' : score >= 50 ? '#f59e0b' : '#ef4444';
  return (
    <div className="flex items-center gap-2">
      <div className="w-16 h-1.5 bg-slate-200 rounded-full overflow-hidden">
        <div style={{ width:`${score}%`, background:color }} className="h-full rounded-full transition-all" />
      </div>
      <span className="text-xs text-slate-500">{score}%</span>
    </div>
  );
}

function Card({ children, className='' }) {
  return <div className={`bg-white rounded-xl border border-slate-200 ${className}`}>{children}</div>;
}

function SectionHeader({ title, subtitle }) {
  return (
    <div className="mb-6">
      <h2 className="text-2xl font-bold text-slate-800 mb-1">{title}</h2>
      {subtitle && <p className="text-slate-500">{subtitle}</p>}
    </div>
  );
}

  const txtCls = { blue:'text-blue-800', purple:'text-purple-800', teal:'text-teal-800', green:'text-emerald-800', amber:'text-amber-800' };

  return (
    <div className="p-8 max-w-3xl fade-in">

        <SectionHeader title="Stage 5b: Supplier Playback Simulator" subtitle="Lieferanten-Erklärungen, Korrekturen und Nachweis-Uploads simuliert einspielen." />
        <button onClick={replay} disabled={running}
          className="ml-4 flex-shrink-0 bg-teal-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-teal-700 disabled:opacity-50 transition-colors">
          {running ? '⏳ Läuft…' : '▶ Replay'}
        </button>
      </div>

      <div className="relative">
        <div className="absolute left-4 top-0 bottom-0 w-0.5 bg-slate-200" />
        <div className="space-y-3">
          {SUPPLIER_EVENTS.slice(0, visible).map((e, i) => (
            <div key={i} className="flex gap-4 relative fade-in">
              <div className={`w-3 h-3 rounded-full mt-2 flex-shrink-0 z-10 ${dotCls[e.color]}`} />
              <div className={`flex-1 border rounded-xl p-4 ${bgCls[e.color]}`}>
                <div className="flex items-center gap-2 mb-1">
                  <span className="font-mono text-xs text-slate-400">2026-05-13 {e.time}</span>
                  <span className={`font-semibold text-sm ${txtCls[e.color]}`}>{e.actor}</span>
                </div>
                <p className={`font-medium text-sm ${txtCls[e.color]}`}>{e.action}</p>
                <p className={`text-xs mt-0.5 opacity-75 ${txtCls[e.color]}`}>{e.detail}</p>
              </div>
            </div>
          ))}
        </div>
      </div>

      {visible < SUPPLIER_EVENTS.length && !running && (
        <button onClick={()=>setVisible(SUPPLIER_EVENTS.length)} className="mt-4 text-sm text-teal-600 hover:text-teal-700 font-medium">
          Alle {SUPPLIER_EVENTS.length} Events anzeigen →
        </button>
      )}
    </div>
  );
}

/* ─── SCREEN 8: COMPLIANCE COCKPIT ─────────────────────────────── */

function ComplianceCockpitScreen() {
  const chartRef = useRef(null);
  const chartInst = useRef(null);
  const [readiness, setReadiness] = useState(76);

  useEffect(() => {
    if (!chartRef.current || typeof echarts === 'undefined') return;
    if (!chartInst.current) chartInst.current = echarts.init(chartRef.current);
    const col = readiness > 85 ? '#10b981' : readiness > 60 ? '#f59e0b' : '#ef4444';
    chartInst.current.setOption({
      series: [{
        type:'gauge', startAngle:200, endAngle:-20,
        min:0, max:100, radius:'95%',
        progress:{ show:true, width:14, itemStyle:{ color:col } },
        pointer:{ show:false },
        axisLine:{ lineStyle:{ width:14, color:[[1,'#e2e8f0']] } },
        axisTick:{ show:false }, splitLine:{ show:false }, axisLabel:{ show:false },
        detail:{ valueAnimation:true, formatter:'{value}%', color:'#1e293b', fontSize:26, fontWeight:'bold', offsetCenter:[0,'-10%'] },

/* ─── ROOT APP ──────────────────────────────────────────────────── */

function App() {
  const [screen, setScreen] = useState('home');
  const cur = NAV.find(n => n.id === screen);

  const Screens = {
    home:      <HomeScreen onNavigate={setScreen} />,
    discovery: <DataDiscoveryScreen />,
    inventory: <DataInventoryScreen />,
    etl:       <ETLPipelineScreen />,
    matching:  <AIMatchingScreen />,
    shaping:   <OsapiensShapingScreen />,
    supplier:  <SupplierPlaybackScreen />,
    cockpit:   <ComplianceCockpitScreen />,
  };

  const go = (id) => {
    const idx = NAV.findIndex(n => n.id === screen);
    const targetIdx = NAV.findIndex(n => n.id === id);
    if (id === 'next') setScreen(NAV[Math.min(idx+1, NAV.length-1)].id);
    else if (id === 'prev') setScreen(NAV[Math.max(idx-1, 0)].id);
    else setScreen(id);
  };

  const curIdx = NAV.findIndex(n => n.id === screen);

  return (
    <div className="flex h-screen overflow-hidden">
      {/* Sidebar */}
      <aside className="w-56 bg-slate-900 text-white flex flex-col flex-shrink-0">
        <div className="p-4 border-b border-slate-700/60">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 bg-teal-500 rounded-lg flex items-center justify-center text-white font-bold text-sm">o</div>

              <p className="text-slate-400 text-xs">Compliance Data Twin</p>
            </div>

          {NAV.map(n => (
            <button key={n.id} onClick={() => setScreen(n.id)}
              className={`w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm transition-all ${screen===n.id?'bg-teal-600 text-white':'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
              <span className="text-base flex-shrink-0">{n.emoji}</span>
              <span className="flex-1 leading-tight">{n.label}</span>

            </button>

          <p>Sparkling Water 1L</p>
          <p>PKG-7781 · DE · PPWR 2026</p>
        </div>
      </aside>

        {/* Topbar */}

          <span className="text-slate-400 text-sm">PPWR</span>
          <span className="text-slate-300">›</span>
          <span className="text-slate-700 text-sm font-medium">{cur?.label}</span>

            </span>
            <span className="text-xs text-slate-400 hidden md:block">Sparkling Water 1L · PKG-7781</span>
          </div>
        </header>

        {/* Content */}
        <main className="flex-1 overflow-y-auto bg-slate-50">
          {Screens[screen]}

        {/* Bottom navigation */}
        {screen !== 'home' && (
          <footer className="bg-white border-t border-slate-200 px-6 py-3 flex items-center justify-between flex-shrink-0">
            <button onClick={() => go('prev')} disabled={curIdx === 0}

              ← {curIdx > 0 ? NAV[curIdx-1].label : ''}
            </button>
            <div className="flex gap-1.5">
              {NAV.map((n,i) => (
                <button key={n.id} onClick={() => setScreen(n.id)}
                  className={`w-2 h-2 rounded-full transition-all ${screen===n.id?'bg-teal-600 w-4':'bg-slate-300 hover:bg-slate-400'}`}/>
              ))}
            </div>
            <button onClick={() => go('next')} disabled={curIdx === NAV.length-1}
              className="flex items-center gap-2 text-sm text-slate-600 hover:text-slate-800 disabled:opacity-30 transition-colors">
              {curIdx < NAV.length-1 ? NAV[curIdx+1].label : ''} →
            </button>
          </footer>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
